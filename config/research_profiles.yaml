defaults:
  chunk_size: 2800          # chars per chunk (~400-450 tokens); tuned for SEC filing density
  chunk_overlap: 350        # overlap to avoid splitting mid-disclosure
  rag_top_k: 32             # chunks retrieved per section (fewer needed with larger chunks)

profiles:
  quick:
    lookback_years: 1
    max_filings: 2          # latest 10-K + latest 10-Q
    max_competitors: 2
    rag_top_k: 12           # chunks retrieved per section
    sections:               # template sections to cover
      - company_snapshot
      - core_product
      - competitive_landscape
      - key_risks
    target_words_min: 1500
    target_words_max: 2500
    include_proxy: false
    include_earnings_calls: false
    # M3 external sources
    enable_web_search: false   # skip for speed; quick is orientation-only
    enable_ir_pages: true
    enable_product_pages: false
    enable_peer_search: true
    enable_peer_llm_ranking: false
    web_search_results_per_query: 2
    max_ir_pages: 1
    max_product_pages: 1
    max_peer_filings: 2        # filings per peer (latest 10-K + 10-Q)

  standard:
    lookback_years: 5
    max_filings: 20         # ~5 years of 10-K + 10-Q
    max_competitors: 5
    rag_top_k: 32           # chunks retrieved per section
    sections:
      - company_snapshot
      - core_product
      - product_market_fit
      - customer_base
      - market_structure
      - competitive_landscape
      - competitive_advantage
      - revenue_model
      - financial_quality
      - management_governance
      - current_challenges
      - growth_opportunities
      - key_risks
      - scenarios
    target_words_min: 4000
    target_words_max: 7000
    include_proxy: true
    include_earnings_calls: true
    # M3 external sources
    enable_web_search: true
    enable_ir_pages: true
    enable_product_pages: true
    enable_peer_search: true
    enable_peer_llm_ranking: false
    web_search_results_per_query: 3
    max_ir_pages: 3
    max_product_pages: 2
    max_peer_filings: 3

  deep:
    lookback_years: 10
    max_filings: 50
    max_competitors: 10
    rag_top_k: 48           # chunks retrieved per section
    sections: all
    target_words_min: 0     # no cap — determined by evidence
    target_words_max: 0
    include_proxy: true
    include_earnings_calls: true
    include_patents: true
    include_regulatory: true
    # M3 external sources
    enable_web_search: true
    enable_ir_pages: true
    enable_product_pages: true
    enable_peer_search: true
    enable_peer_llm_ranking: true
    web_search_results_per_query: 5
    max_ir_pages: 8
    max_product_pages: 5
    max_peer_filings: 5
